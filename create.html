<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کارگاه سازندگان - بوم نقشه راه (چند فصلی)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { vazirmatn: ['Vazirmatn', 'sans-serif'] },
                    colors: {
                        brand: { dark: '#0f172a', panel: '#1e293b', gold: '#facc15', goldHover: '#fde047' }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Vazirmatn', sans-serif; background-color: #0f172a; margin: 0; overflow: hidden; }
        .bg-canvas-dots { background-color: #0f172a; background-image: radial-gradient(#334155 1.5px, transparent 1.5px); background-size: 28px 28px; }
        
        /* کرسرهای تعاملی اسکرول بوم */
        .canvas-container { cursor: grab; user-select: none; }
        .canvas-container:active { cursor: grabbing; }
        
        /* بازیابی کرسرهای عادی برای گره‌ها و دکمه‌ها در کل بوم */
        .node-box, .zoom-controls, .absolute-controls, button, select, input, textarea, a, .pointer-events-auto { cursor: auto !important; }
        .node-box { cursor: grab !important; }
        .node-box:active { cursor: grabbing !important; }
        
        .path-line { stroke: #64748b; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; animation: dashFlow 30s linear infinite; transition: stroke 0.2s; pointer-events: auto; cursor: pointer; }
        .path-hitbox { stroke: transparent; stroke-width: 15; fill: none; pointer-events: auto; cursor: crosshair; }
        .path-line:hover, .path-hitbox:hover + .path-line { stroke: #facc15; }
        .path-temp { stroke: #facc15; stroke-width: 3; fill: none; stroke-dasharray: 6 6; animation: dashFlow 15s linear infinite reverse; }
        @keyframes dashFlow { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .mode-select .node-box { cursor: grab; }
        .mode-select .node-box:active { cursor: grabbing; }
        .mode-connect { cursor: crosshair; }
        .mode-connect .node-box { cursor: crosshair; }
        .mode-delete { cursor: not-allowed; }
        .mode-delete .node-box { cursor: pointer; }
        
        .slide-next-enter-active, .slide-next-leave-active, .slide-prev-enter-active, .slide-prev-leave-active { transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease; position: absolute; width: 100%; height: 100%; }
        .slide-next-enter-from { transform: translateX(100%); opacity: 0; }
        .slide-next-leave-to { transform: translateX(-100%); opacity: 0; }
        .slide-prev-enter-from { transform: translateX(-100%); opacity: 0; }
        .slide-prev-leave-to { transform: translateX(100%); opacity: 0; }
        
        .fade-slide-enter-active, .fade-slide-leave-active { transition: opacity 0.3s ease, transform 0.3s ease; }
        .fade-slide-enter-from, .fade-slide-leave-to { opacity: 0; transform: translateX(-15px); }

        /* ترنزیشن و انیمیشن شکیل باز شدن مدال */
        .modal-scale-enter-active, .modal-scale-leave-active {
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-scale-enter-active .bg-slate-900,
        .modal-scale-leave-active .bg-slate-900 {
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-scale-enter-from { opacity: 0; }
        .modal-scale-enter-from .bg-slate-900 {
            transform: scale(0.92) translateY(15px);
            opacity: 0;
        }
        .modal-scale-leave-to { opacity: 0; }
        .modal-scale-leave-to .bg-slate-900 {
            transform: scale(0.96) translateY(5px);
            opacity: 0;
        }
    </style>
</head>
<body class="text-slate-200 h-screen w-full flex flex-col overflow-hidden">

    <div id="app" class="h-full w-full flex flex-col" :class="'mode-' + currentMode">
        
        <header class="h-16 bg-brand-panel border-b border-slate-700 flex items-center justify-between px-6 shrink-0 z-40 shadow-md">
            <div class="flex items-center gap-4">
                <div class="text-xl font-black text-brand-gold flex items-center gap-2">
                    <i class="ph-fill ph-hexagon"></i>
                    حفظ النور
                </div>
                <div class="h-6 w-px bg-slate-600"></div>
                <div class="flex items-center gap-2 text-sm">
                    <span class="text-slate-400">کارگاه سازندگان</span>
                    <i class="ph ph-caret-left text-slate-500 text-xs"></i>
                    <h1 class="font-bold text-slate-100">طراحی چالش جزء ۳۰</h1>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-xs bg-slate-800 px-3 py-1.5 rounded-lg text-slate-400 border border-slate-700 hidden md:block">
                    <span v-if="currentMode === 'select'">ابزار انتخاب: کشیدن بوم برای جابجایی نقشه | تک‌کلیک روی گام برای تنظیمات </span>
                    <span v-if="currentMode === 'connect'" class="text-emerald-400">ابزار اتصال: کشیدن از یک گره به گره دیگر</span>
                    <span v-if="currentMode === 'delete'" class="text-red-400">ابزار حذف: کلیک روی گره یا مسیر جهت پاک کردن</span>
                </div>
                
                <button class="flex items-center gap-2 px-5 py-2.5 bg-brand-gold hover:bg-brand-goldHover text-brand-dark text-sm font-bold rounded-xl shadow-[0_0_15px_rgba(250,204,21,0.25)] transition-all">
                    <i class="ph ph-paper-plane-right text-lg"></i>
                    ذخیره و انتشار
                </button>
            </div>
        </header>

        <main class="flex-1 flex relative overflow-hidden bg-canvas-dots">
            
            <transition :name="transitionName">
                <div :key="activeChapter.id" class="canvas-scroll-area canvas-container absolute inset-0 overflow-auto w-full h-full z-10" dir="ltr"
                     ref="canvasScrollArea"
                     @mousedown="onCanvasMouseDown"
                     @mousemove="onMouseMove" 
                     @mouseup="onCanvasMouseUp" 
                     @mouseleave="onCanvasMouseUp">
                    
                    <div class="zoom-wrapper relative w-[3000px] h-[3000px]"
                         :style="{ transform: `scale(${zoomLevel})`, transformOrigin: '0 0', transition: 'transform 0.15s ease-out' }">

                        <svg class="absolute top-0 left-0 w-full h-full pointer-events-none z-0">
                            <defs>
                                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b" /></marker>
                                <marker id="arrowhead-gold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#facc15" /></marker>
                                <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" /></marker>
                            </defs>
                            
                            <g v-for="(path, index) in svgPaths" :key="'conn-'+index">
                                <path :d="path.d" class="path-hitbox" @mousedown.stop="handlePathClick(index)" />
                                <path :d="path.d" class="path-line" :class="{ 'stroke-red-500': currentMode === 'delete' }" 
                                      :marker-end="currentMode === 'delete' ? 'url(#arrowhead-red)' : 'url(#arrowhead)'" />
                            </g>

                            <path v-if="tempPath" :d="tempPath" class="path-temp" marker-end="url(#arrowhead-gold)"/>
                        </svg>

                        <div v-for="node in activeChapter.nodes" :key="node.id" dir="rtl"
                             @mousedown.stop="handleNodeMouseDown(node, $event)"
                             @mouseup.stop="handleNodeMouseUp(node)"
                             @click.stop="handleNodeClick(node, $event)"
                             @dblclick="startEdit(node)"
                             :style="{ left: node.x + 'px', top: node.y + 'px', width: node.w + 'px' }"
                             class="absolute z-10 node-box transition-all duration-200"
                             :class="[
                                 node.bg, node.border,
                                 isDragging && dragNode?.id === node.id ? 'shadow-[0_0_20px_rgba(250,204,21,0.4)] scale-105 z-20' : 'shadow-lg',
                                 currentMode === 'delete' ? 'hover:border-red-500 hover:shadow-[0_0_15px_rgba(239,68,68,0.4)]' : 'hover:shadow-xl',
                                 currentMode === 'connect' && connectingStartNode?.id === node.id ? 'border-brand-gold shadow-[0_0_15px_rgba(250,204,21,0.6)]' : ''
                             ]"
                             style="border-width: 1.5px;">
                            
                            <div class="flex items-center gap-3 px-4 py-3 rounded-inherit">
                                <div class="flex items-center justify-center rounded-lg w-8 h-8 shrink-0" :class="node.iconBg">
                                    <i :class="['ph text-xl', node.icon, node.color]"></i>
                                </div>
                                <span v-if="editingNodeId !== node.id" class="text-sm font-semibold text-slate-200 truncate select-none flex-1">
                                    {{ node.title }}
                                </span>
                                <input v-else type="text" v-model="node.title" @blur="stopEdit" @keyup.enter="stopEdit" v-focus
                                       class="flex-1 bg-slate-800 text-sm text-white font-semibold border border-brand-gold rounded px-2 py-1 outline-none w-full" />
                            </div>

                            <div class="absolute -bottom-1.5 left-1/2 transform -translate-x-1/2 w-3 h-3 bg-brand-panel border-2 border-slate-500 rounded-full" :class="{'border-emerald-400 bg-emerald-400': currentMode === 'connect'}"></div>
                            <div v-if="node.type !== 'start'" class="absolute -top-1.5 left-1/2 transform -translate-x-1/2 w-3 h-3 bg-brand-panel border-2 border-slate-500 rounded-full" :class="{'border-emerald-400 bg-emerald-400': currentMode === 'connect'}"></div>
                            <div class="absolute top-1/2 -left-1.5 transform -translate-y-1/2 w-3 h-3 bg-brand-panel border-2 border-slate-500 rounded-full" :class="{'border-emerald-400 bg-emerald-400': currentMode === 'connect'}"></div>
                            <div class="absolute top-1/2 -right-1.5 transform -translate-y-1/2 w-3 h-3 bg-brand-panel border-2 border-slate-500 rounded-full" :class="{'border-emerald-400 bg-emerald-400': currentMode === 'connect'}"></div>
                        </div>

                    </div>
                </div>
            </transition>

            <div class="absolute top-6 right-6 flex gap-4 z-30 pointer-events-none">
                <div class="w-14 bg-brand-panel border border-slate-700 rounded-2xl flex flex-col items-center py-4 gap-2 shadow-2xl pointer-events-auto backdrop-blur-sm bg-opacity-90">
                    <button @click="setMode('select')" class="p-2.5 rounded-xl transition-all tooltip relative group" title="جابجایی و ویرایش" :class="currentMode === 'select' ? 'bg-brand-gold/10 text-brand-gold shadow-[0_0_10px_rgba(250,204,21,0.2)]' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'"><i class="ph-fill ph-cursor text-2xl"></i></button>
                    <button @click="setMode('connect')" class="p-2.5 rounded-xl transition-all tooltip relative group" title="اتصال مراحل (فلوچارت)" :class="currentMode === 'connect' ? 'bg-emerald-500/10 text-emerald-400 shadow-[0_0_10px_rgba(16,185,129,0.2)]' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'"><i class="ph ph-link text-2xl"></i></button>
                    <button @click="setMode('delete')" class="p-2.5 rounded-xl transition-all tooltip relative group" title="حذف مرحله یا مسیر" :class="currentMode === 'delete' ? 'bg-red-500/10 text-red-400 shadow-[0_0_10px_rgba(239,68,68,0.2)]' : 'text-slate-400 hover:text-red-300 hover:bg-slate-700/50'"><i class="ph ph-trash text-2xl"></i></button>
                    <div class="w-8 h-px bg-slate-700 my-2"></div>
                    <button @click="isContentPanelOpen = !isContentPanelOpen" class="p-2.5 rounded-xl transform transition-all duration-800 tooltip relative group" title="افزودن محتوای جدید" :class="isContentPanelOpen ? 'bg-blue-500/10 text-blue-400 shadow-[0_0_10px_rgba(59,130,246,0.2)]' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'"><i class="ph ph-squares-four text-2xl"></i></button>
                </div>

                <transition name="fade-slide">
                    <div v-if="isContentPanelOpen" class="w-64 bg-brand-panel border border-slate-700 rounded-2xl shadow-2xl flex flex-col overflow-hidden pointer-events-auto backdrop-blur-sm bg-opacity-95">
                        <div class="p-4 border-b border-slate-700/80 bg-slate-800/50 flex justify-between items-center">
                            <h2 class="text-sm font-bold text-slate-200 flex items-center gap-2"><i class="ph ph-squares-four text-blue-400"></i> افزودن محتوای</h2>
                            <button @click="isContentPanelOpen = false" class="text-slate-400 hover:text-slate-200"><i class="ph ph-x"></i></button>
                        </div>
                        <div class="p-4 grid grid-cols-2 gap-3 overflow-y-auto max-h-[calc(100vh-200px)] custom-scrollbar">
                            <button @click="addNode('chapter')" class="col-span-2 flex flex-col items-center justify-center py-4 border border-dashed border-brand-gold/40 bg-brand-gold/5 rounded-xl hover:bg-brand-gold/10 hover:border-brand-gold/80 transition-all gap-2 group">
                                <i class="ph ph-plus-circle text-3xl text-brand-gold group-hover:scale-110 transition-transform"></i>
                                <span class="text-xs font-bold text-brand-gold">ایجاد فصل (اتاق) جدید</span>
                            </button>
                            <button @click="addNode('quiz')" class="flex flex-col items-center justify-center p-3 border border-slate-700 bg-brand-dark rounded-xl hover:border-slate-500 hover:bg-slate-800 transition-colors gap-2 group"><i class="ph ph-exam text-2xl text-blue-400 group-hover:-translate-y-1 transition-transform"></i><span class="text-xs text-slate-300 font-medium">آزمون</span></button>
                            <button @click="addNode('video')" class="flex flex-col items-center justify-center p-3 border border-slate-700 bg-brand-dark rounded-xl hover:border-slate-500 hover:bg-slate-800 transition-colors gap-2 group"><i class="ph ph-video-camera text-2xl text-purple-400 group-hover:-translate-y-1 transition-transform"></i><span class="text-xs text-slate-300 font-medium">ویدیو</span></button>
                            <button @click="addNode('practice')" class="flex flex-col items-center justify-center p-3 border border-slate-700 bg-brand-dark rounded-xl hover:border-slate-500 hover:bg-slate-800 transition-colors gap-2 group"><i class="ph ph-pencil-simple text-2xl text-green-400 group-hover:-translate-y-1 transition-transform"></i><span class="text-xs text-slate-300 font-medium">متن / تمرین</span></button>
                            <button @click="addNode('stage')" class="flex flex-col items-center justify-center p-3 border border-slate-700 bg-brand-dark rounded-xl hover:border-slate-500 hover:bg-slate-800 transition-colors gap-2 group"><i class="ph ph-flag-checkered text-2xl text-emerald-400 group-hover:-translate-y-1 transition-transform"></i><span class="text-xs text-slate-300 font-medium">مرحله ترکیبی</span></button>
                        </div>
                    </div>
                </transition>
            </div>

            <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex items-center bg-brand-panel border border-slate-700 rounded-2xl shadow-[0_10px_25px_-5px_rgba(0,0,0,0.5)] z-40 p-2 gap-4 pointer-events-auto">
                <button @click="nextChapter" :disabled="currentChapterIndex === chapters.length - 1" class="flex items-center gap-1 px-3 py-2 text-sm rounded-lg transition-colors" :class="currentChapterIndex === chapters.length - 1 ? 'text-slate-600 cursor-not-allowed' : 'text-slate-300 hover:text-brand-gold hover:bg-slate-800'"><i class="ph-bold ph-caret-right"></i> فصل بعد</button>
                <div class="w-px h-6 bg-slate-700 my-auto"></div>
                <div v-if="!isEditingChapter" @dblclick="isEditingChapter = true" class="text-brand-gold font-bold text-sm min-w-[120px] text-center cursor-pointer hover:text-brand-goldHover flex items-center justify-center gap-1 tooltip" title="دابل-کلیک برای تغییر نام">{{ activeChapter.title }}<i class="ph ph-pencil-simple text-[10px] opacity-60"></i></div>
                <input v-else type="text" v-model="activeChapter.title" @blur="isEditingChapter = false" @keyup.enter="isEditingChapter = false" v-focus class="bg-slate-800 text-sm text-brand-gold font-bold border border-brand-gold rounded px-2 py-1 outline-none text-center min-w-[120px]" />
                <div class="w-px h-6 bg-slate-700 my-auto"></div>
                <button @click="prevChapter" :disabled="currentChapterIndex === 0" class="flex items-center gap-1 px-3 py-2 text-sm rounded-lg transition-colors" :class="currentChapterIndex === 0 ? 'text-slate-600 cursor-not-allowed' : 'text-slate-300 hover:text-brand-gold hover:bg-slate-800'">فصل قبل <i class="ph-bold ph-caret-left"></i></button>
            </div>

            <zoom-controls 
                :zoom-level="zoomLevel" 
                @zoom-in="zoomIn" 
                @zoom-out="zoomOut" 
                @reset-zoom="resetZoom">
            </zoom-controls>

        </main>

        <node-modal 
            :is-open="isModalOpen" 
            :node="selectedNode" 
            @close="closeModal" 
            @save="saveModalData">
        </node-modal>

    </div>

    <script type="module">
        import { NodeModal } from './components/NodeModal.js';
        import { ZoomControls } from './components/ZoomControls.js';

        const { createApp, ref, computed } = Vue;

        createApp({
            components: {
                'node-modal': NodeModal,
                'zoom-controls': ZoomControls
            },
            directives: {
                focus: { mounted(el) { el.focus(); el.select(); } }
            },
            setup() {
                const currentMode = ref('select');
                const isContentPanelOpen = ref(false);
                const transitionName = ref('slide-next');
                const isEditingChapter = ref(false);
                const zoomLevel = ref(1);
                
                const isModalOpen = ref(false);
                const selectedNode = ref(null);

                // متغیرهای درگ کردن نقشه و اسکرول بوم
                const canvasScrollArea = ref(null);
                const isDraggingCanvas = ref(false);
                const canvasStartScroll = ref({ left: 0, top: 0 });
                const canvasStartMouse = ref({ x: 0, y: 0 });

                const dragStartPos = ref({ x: 0, y: 0 });
                const isDragging = ref(false);
                const dragNode = ref(null);
                const offset = ref({ x: 0, y: 0 });
                const connectingStartNode = ref(null);
                const mousePos = ref({ x: 0, y: 0 });
                const editingNodeId = ref(null);

                const chapters = ref([
                    {
                        id: 1,
                        title: 'فصل ۱: مبانی اولیه',
                        nodes: [
                            { id: 1, type: 'start', title: 'شروع فصل', icon: 'ph-play', color: 'text-brand-dark', iconBg: 'bg-brand-gold', border: 'border-brand-gold rounded-full', bg: 'bg-brand-panel', x: 450, y: 80, w: 160 },
                            { id: 2, type: 'stage', title: 'مرحله اول', icon: 'ph-flag-checkered', color: 'text-emerald-400', iconBg: 'bg-emerald-400/10', border: 'border-slate-700 rounded-xl', bg: 'bg-brand-dark', x: 450, y: 220, w: 160, stageMission: '', rewardXp: 50, rewardCoins: 10, requireApproval: false, quizQuestions: [] }
                        ],
                        connections: [{ from: 1, to: 2 }]
                    }
                ]);
                const currentChapterIndex = ref(0);
                const activeChapter = computed(() => chapters.value[currentChapterIndex.value]);

                const zoomIn = () => { if (zoomLevel.value < 2) zoomLevel.value = parseFloat((zoomLevel.value + 0.1).toFixed(1)); };
                const zoomOut = () => { if (zoomLevel.value > 0.4) zoomLevel.value = parseFloat((zoomLevel.value - 0.1).toFixed(1)); };
                const resetZoom = () => { zoomLevel.value = 1; };

                const openModal = (node) => {
                    selectedNode.value = node;
                    isModalOpen.value = true;
                };
                const closeModal = () => {
                    isModalOpen.value = false;
                    selectedNode.value = null;
                };
                const saveModalData = (updatedData) => {
                    const index = activeChapter.value.nodes.findIndex(n => n.id === selectedNode.value.id);
                    if (index !== -1) {
                        activeChapter.value.nodes[index] = { ...activeChapter.value.nodes[index], ...updatedData };
                    }
                    closeModal();
                };

                const nextChapter = () => { if (currentChapterIndex.value < chapters.value.length - 1) { transitionName.value = 'slide-next'; currentChapterIndex.value++; } };
                const prevChapter = () => { if (currentChapterIndex.value > 0) { transitionName.value = 'slide-prev'; currentChapterIndex.value--; } };

                const setMode = (mode) => { currentMode.value = mode; connectingStartNode.value = null; };

                const getMouseCoords = (e) => {
                    const wrapper = document.querySelector('.zoom-wrapper');
                    if(!wrapper) return { x: e.clientX, y: e.clientY };
                    const rect = wrapper.getBoundingClientRect();
                    return { x: (e.clientX - rect.left) / zoomLevel.value, y: (e.clientY - rect.top) / zoomLevel.value };
                };

                // شروع درگ بوم با کلیک روی فضای خالی بوم
                const onCanvasMouseDown = (e) => {
                    // بررسی اینکه روی گره‌ها یا ابزارهای دیگر کلیک نشده باشد
                    if (e.target.closest('.node-box') || e.target.closest('.pointer-events-auto') || e.target.closest('button')) return;
                    
                    isDraggingCanvas.value = true;
                    const el = canvasScrollArea.value;
                    canvasStartScroll.value = {
                        left: el.scrollLeft,
                        top: el.scrollTop
                    };
                    canvasStartMouse.value = {
                        x: e.clientX,
                        y: e.clientY
                    };
                };

                const handleNodeMouseDown = (node, e) => {
                    dragStartPos.value = { x: e.clientX, y: e.clientY };
                    const coords = getMouseCoords(e); 
                    if (currentMode.value === 'select') {
                        isDragging.value = true;
                        dragNode.value = node;
                        offset.value = { x: coords.x - node.x, y: coords.y - node.y };
                    } else if (currentMode.value === 'connect') {
                        connectingStartNode.value = node;
                    } else if (currentMode.value === 'delete') {
                        activeChapter.value.nodes = activeChapter.value.nodes.filter(n => n.id !== node.id);
                        activeChapter.value.connections = activeChapter.value.connections.filter(c => c.from !== node.id && c.to !== node.id);
                    }
                };

                const handleNodeClick = (node, e) => {
                    if (currentMode.value !== 'select') return;
                    const dx = e.clientX - dragStartPos.value.x;
                    const dy = e.clientY - dragStartPos.value.y;
                    if (Math.sqrt(dx * dx + dy * dy) < 5) {
                        openModal(node);
                    }
                };

                const handleNodeMouseUp = (node) => {
                    if (currentMode.value === 'connect' && connectingStartNode.value && connectingStartNode.value.id !== node.id) {
                        const exists = activeChapter.value.connections.find(c => c.from === connectingStartNode.value.id && c.to === node.id);
                        if (!exists) activeChapter.value.connections.push({ from: connectingStartNode.value.id, to: node.id });
                    }
                    isDragging.value = false;
                    dragNode.value = null;
                    connectingStartNode.value = null;
                };

                const onMouseMove = (e) => {
                    const coords = getMouseCoords(e);
                    mousePos.value = coords; 

                    // درگ کردن بوم (کشیدن پس زمینه)
                    if (isDraggingCanvas.value) {
                        const dx = e.clientX - canvasStartMouse.value.x;
                        const dy = e.clientY - canvasStartMouse.value.y;
                        const el = canvasScrollArea.value;
                        el.scrollLeft = canvasStartScroll.value.left - dx;
                        el.scrollTop = canvasStartScroll.value.top - dy;
                        return;
                    }

                    // درگ گره‌ها
                    if (isDragging.value && dragNode.value && currentMode.value === 'select') {
                        dragNode.value.x = coords.x - offset.value.x;
                        dragNode.value.y = coords.y - offset.value.y;
                    }
                };

                const onCanvasMouseUp = () => { 
                    isDragging.value = false; 
                    dragNode.value = null; 
                    connectingStartNode.value = null; 
                    isDraggingCanvas.value = false;
                };

                const handlePathClick = (index) => { if (currentMode.value === 'delete') activeChapter.value.connections.splice(index, 1); };
                const startEdit = (node) => { if(currentMode.value === 'select') editingNodeId.value = node.id; };
                const stopEdit = () => editingNodeId.value = null;

                const getNodePorts = (node) => {
                    const w = node.w, h = 56;
                    return {
                        top: { x: node.x + w / 2, y: node.y - 2 },
                        bottom: { x: node.x + w / 2, y: node.y + h + 2 },
                        left: { x: node.x - 2, y: node.y + h / 2 },
                        right: { x: node.x + w + 2, y: node.y + h / 2 },
                        center: { x: node.x + w / 2, y: node.y + h / 2 }
                    };
                };

                const getBestConnection = (fromNode, toPoint) => {
                    const ports1 = getNodePorts(fromNode);
                    const isNode = toPoint.w !== undefined;
                    const ports2 = isNode ? getNodePorts(toPoint) : { top: toPoint, bottom: toPoint, left: toPoint, right: toPoint, center: toPoint };
                    const dx = ports2.center.x - ports1.center.x;
                    const dy = ports2.center.y - ports1.center.y;
                    let start, end, isHorizontal = Math.abs(dx) > Math.abs(dy);
                    if (isHorizontal) {
                        start = dx > 0 ? ports1.right : ports1.left;
                        end = isNode ? (dx > 0 ? ports2.left : ports2.right) : toPoint;
                    } else {
                        start = dy > 0 ? ports1.bottom : ports1.top;
                        end = isNode ? (dy > 0 ? ports2.top : ports2.bottom) : toPoint;
                    }
                    return { startX: start.x, startY: start.y, endX: end.x, endY: end.y, isHorizontal };
                };

                const createBezierPath = (startX, startY, endX, endY, isHorizontal) => {
                    const factor = Math.max(30, isHorizontal ? Math.abs(endX - startX) / 2 : Math.abs(endY - startY) / 2);
                    return isHorizontal 
                        ? `M ${startX} ${startY} C ${startX + factor} ${startY}, ${endX - factor} ${endY}, ${endX} ${endY}`
                        : `M ${startX} ${startY} C ${startX} ${startY + factor}, ${endX} ${endY - factor}, ${endX} ${endY}`;
                };

                const svgPaths = computed(() => {
                    return activeChapter.value.connections.map(conn => {
                        const fromNode = activeChapter.value.nodes.find(n => n.id === conn.from);
                        const toNode = activeChapter.value.nodes.find(n => n.id === conn.to);
                        if (!fromNode || !toNode) return { d: '' };
                        const { startX, startY, endX, endY, isHorizontal } = getBestConnection(fromNode, toNode);
                        return { d: createBezierPath(startX, startY, endX, endY, isHorizontal) };
                    });
                });

                const tempPath = computed(() => {
                    if (!connectingStartNode.value || currentMode.value !== 'connect') return '';
                    const { startX, startY, endX, endY, isHorizontal } = getBestConnection(connectingStartNode.value, mousePos.value);
                    return createBezierPath(startX, startY, endX, endY, isHorizontal);
                });

                const addNode = (type) => {
                    if (type === 'chapter') {
                        chapters.value.push({
                            id: Date.now(),
                            title: `فصل ${chapters.value.length + 1}: عنوان جدید`,
                            nodes: [{ id: Date.now() + 1, type: 'start', title: 'شروع فصل', icon: 'ph-play', color: 'text-brand-dark', iconBg: 'bg-brand-gold', border: 'border-brand-gold rounded-full', bg: 'bg-brand-panel', x: 450, y: 80, w: 160 }],
                            connections: []
                        });
                        transitionName.value = 'slide-next';
                        currentChapterIndex.value = chapters.value.length - 1;
                        isContentPanelOpen.value = false;
                        return;
                    }

                    const id = Date.now();
                    let newNode = { id, type, x: 200, y: 200, w: 160, rewardXp: 50, rewardCoins: 10, quizQuestions: [] };

                    if (type === 'quiz') newNode = { ...newNode, title: 'آزمون جدید', icon: 'ph-exam', color: 'text-blue-400', iconBg: 'bg-blue-400/10', border: 'border-blue-500/30 rounded-xl', bg: 'bg-brand-dark', quizType: 'multiple' };
                    if (type === 'video') newNode = { ...newNode, title: 'ویدیو آموزشی', icon: 'ph-video-camera', color: 'text-purple-400', iconBg: 'bg-purple-400/10', border: 'border-purple-500/30 rounded-xl', bg: 'bg-brand-dark' };
                    if (type === 'practice') newNode = { ...newNode, title: 'توضیح / تمرین', icon: 'ph-pencil-simple', color: 'text-green-400', iconBg: 'bg-green-400/10', border: 'border-green-500/30 rounded-xl', bg: 'bg-brand-dark' };
                    if (type === 'stage') newNode = { ...newNode, title: 'مرحله جدید', icon: 'ph-flag-checkered', color: 'text-emerald-400', iconBg: 'bg-emerald-400/10', border: 'border-slate-700 rounded-xl', bg: 'bg-brand-dark' };
                    
                    activeChapter.value.nodes.push(newNode);
                    isContentPanelOpen.value = false;
                };

                return { 
                    chapters, currentChapterIndex, activeChapter, nextChapter, prevChapter, transitionName, isEditingChapter, currentMode, setMode, zoomLevel, zoomIn, zoomOut, resetZoom, isDragging, dragNode, connectingStartNode, handleNodeMouseDown, handleNodeMouseUp, handleNodeClick, onMouseMove, onCanvasMouseUp, handlePathClick, startEdit, stopEdit, editingNodeId, svgPaths, tempPath, addNode, isContentPanelOpen,
                    isModalOpen, selectedNode, closeModal, saveModalData,
                    canvasScrollArea, onCanvasMouseDown
                };
            }
        }).mount('#app');
    </script>
</body>
